databases:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  - name: pos-operatorio-db
    plan: basic
    region: oregon

services:
  # ── Next.js Main App ────────────────────────────────────────────────
  - type: web
    name: pos-operatorio-web
    env: node
    repo: https://github.com/Maxh8054/Remedios
    region: oregon
    plan: starter
    buildCommand: npm install && npx prisma generate && npx next build
    startCommand: bash scripts/render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: pos-operatorio-db
          property: connectionString
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: WHATSAPP_SERVICE_URL
        value: https://pos-operatorio-whatsapp.onrender.com

  # ── Notification Service ────────────────────────────────────────────
  - type: web
    name: pos-operatorio-notif
    env: docker
    repo: https://github.com/Maxh8054/Remedios
    region: oregon
    plan: starter
    dockerContext: mini-services/notification-service
    dockerfilePath: mini-services/notification-service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: MAIN_APP_URL
        value: https://pos-operatorio-web.onrender.com
      - key: WHATSAPP_SERVICE_URL
        value: https://pos-operatorio-whatsapp.onrender.com

  # ── WhatsApp Service ────────────────────────────────────────────────
  - type: web
    name: pos-operatorio-whatsapp
    env: docker
    repo: https://github.com/Maxh8054/Remedios
    region: oregon
    plan: starter
    dockerContext: mini-services/whatsapp-service
    dockerfilePath: mini-services/whatsapp-service/Dockerfile
    disk:
      name: whatsapp-auth
      mountPath: /app/auth
    envVars:
      - key: PORT
        value: "10000"
      - key: WA_PHONE_NUMBERS
        value: "5562981206800,5562982093453,5562983068941"
